<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Part 2: Interests & Skills</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      .top-header {
        background: var(--primary-blue);
        color: #3b72a0;
        padding: 10px 25px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        font-size: 30px;
      }
      body {
        background-color: #f5f8fb;
      }

      .quiz-wrapper {
        background: #ffffff;
        border-radius: 25px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        padding: 50px;
        margin: 60px auto;
        width: 90%;
        max-width: 1200px;
      }

      h2 {
        text-align: center;
        font-weight: 800;
        color: #3b72a0;
        margin-bottom: 25px;
      }

      .separator {
        width: 100%;
        height: 5px;
        background: #e6eef5;
        border-radius: 50px;
        margin-bottom: 45px;
      }

      .options-row {
        display: flex;
        justify-content: space-between;
        text-align: center;
        gap: 10px;
        margin-top: 40px;
      }

      .answer-btn {
        width: 180px;
        padding: 25px 10px;
        background: #ffffff;
        border-radius: 15px;
        border: 2px solid #d6e0eb;
        font-size: 20px;
        transition: 0.2s;
        cursor: pointer;
      }

      .answer-btn.active {
        background: #3b72a0;
        color: white;
        border-color: #3b72a0;
      }

      .nav-buttons {
        margin-top: 45px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .btn-prev {
        background: #7a8590;
        padding: 15px 40px;
        border-radius: 40px;
        color: white;
        font-size: 20px;
        font-weight: 600;
        border: none;
      }

      .btn-next {
        background: #ff8500;
        padding: 15px 40px;
        border-radius: 40px;
        color: white;
        font-size: 20px;
        font-weight: 700;
        border: none;
      }

      .btn-next:hover {
        background: #ff9c33;
      }
      .btn-prev:hover {
        background: #626f78;
      }
    </style>
  </head>

  <body>
    <div class="top-header">
      <div>EduPathAI</div>
      <div id="counter">Question 21 of 50</div>
    </div>
    <div class="quiz-wrapper">
      <h2>Part 2: Interests & Skills</h2>

      <div class="separator"></div>

      <h4 id="question-text" class="text-center fw-semibold"></h4>

      <div class="options-row btn-group">
        <button class="answer-btn" data-value="1">
          1<br />Strongly Disagree
        </button>
        <button class="answer-btn" data-value="2">2<br />Disagree</button>
        <button class="answer-btn" data-value="3">3<br />Neutral</button>
        <button class="answer-btn" data-value="4">4<br />Agree</button>
        <button class="answer-btn" data-value="5">5<br />Strongly Agree</button>
      </div>

      <div class="nav-buttons">
        <button id="prev-btn" class="btn-prev">← Previous</button>
        <button id="next-btn" class="btn-next">Next Question →</button>
      </div>
    </div>

    <script src="part2_logic.js"></script>
  </body>
</html>
