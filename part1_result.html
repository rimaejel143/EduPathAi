<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Part 1 Results - Personality Analysis</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-blue: #3b72a0;
        --yellow: #fdc80a;
        --light-gray: #eef1f4;
      }

      body {
        background-color: rgba(0, 0, 0, 0.4);
      }

      /* ===== MODAL BOX STYLE (exactly like your old design) ===== */
      .result-modal {
        max-width: 650px;
        margin: 60px auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        animation: fadeIn 0.4s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-header {
        background-color: var(--primary-blue);
        padding: 18px 25px;
        color: white;
        font-size: 22px;
        font-weight: 700;
      }

      .close-btn {
        color: white;
        font-size: 26px;
        cursor: pointer;
      }

      .modal-body {
        padding: 35px 40px;
      }

      .result-item {
        margin-bottom: 28px;
      }

      .trait-label {
        font-size: 17px;
        font-weight: 600;
        color: #333;
      }

      .percent-label {
        font-weight: bold;
        color: var(--primary-blue);
        font-size: 17px;
      }

      .progress {
        height: 18px;
        background: var(--light-gray);
        border-radius: 10px;
      }

      .progress-bar {
        background: var(--yellow);
      }

      #next-btn {
        background: var(--yellow);
        border-radius: 50px;
        padding: 12px 35px;
        font-size: 18px;
        font-weight: bold;
        margin: 20px auto 35px auto;
        display: block;
        border: none;
        color: #333;
        transition: 0.25s;
      }

      #next-btn:hover {
        background: #ffcf30;
      }
    </style>
  </head>

  <body>
    <div class="result-modal">
      <!-- HEADER -->
      <div
        class="modal-header d-flex justify-content-between align-items-center"
      >
        <span>Part 1 Results: Personality Analysis</span>
        <span class="close-btn" onclick="window.location.href='part1.html'"
          >&times;</span
        >
      </div>

      <!-- RESULTS -->
      <div class="modal-body">
        <p class="text-center mb-4 fw-bold" style="font-size: 20px">
          Your results for Part 1:
        </p>

        <div id="results-container"></div>

        <p id="summary" class="text-center mt-4" style="font-size: 18px"></p>

        <button id="next-btn" onclick="window.location.href='part2.html'">
          Continue to Next Part →
        </button>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        fetch("php/assessment/part_result.php?part=1")
          .then((res) => res.json())
          .then((data) => {
            const container = document.getElementById("results-container");

            if (!data.success) {
              container.innerHTML =
                "<p class='text-center'>No results found. Complete Part 1 first.</p>";
              return;
            }

            const traits = Object.entries(data.traits);
            let html = "";

            traits.forEach(([trait, score], index) => {
              const percent = Math.min(100, Math.round((score / 150) * 100));

              html += `
              <div class="result-item">
                <div class="d-flex justify-content-between mb-1">
                  <span class="trait-label">${index + 1}. ${trait}</span>
                  <span class="percent-label">${percent}%</span>
                </div>
                <div class="progress">
                  <div class="progress-bar" style="width: ${percent}%"></div>
                </div>
              </div>
            `;
            });

            container.innerHTML = html;

            // strongest
            const top = traits.sort((a, b) => b[1] - a[1])[0];
            document.getElementById(
              "summary"
            ).innerHTML = `Your strongest personality trait is <strong>${top[0]}</strong>.`;
          });
      });
    </script>
  </body>
</html>
