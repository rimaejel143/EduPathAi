<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Final Major Recommendation</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-blue: #1b3a5e;
        --accent-yellow: #fdc80a;
      }
      body {
        background: #f5f8fb;
        font-family: "Segoe UI", sans-serif;
      }
      .result-card {
        background: #fff;
        border-radius: 20px;
        margin-top: 50px;
        padding: 40px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      }
      .final-major {
        font-size: 2.2rem;
        font-weight: 800;
        color: var(--primary-blue);
      }
      .confidence-pill {
        background: var(--accent-yellow);
        padding: 8px 20px;
        border-radius: 30px;
        display: inline-block;
        font-weight: bold;
      }
      #loading {
        font-size: 1.3rem;
        font-weight: 600;
        color: #666;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="result-card text-center">
        <h2 class="mb-4">🎓 Your Final Recommended Major</h2>

        <div id="loading">Calculating your results...</div>

        <div id="result-box" style="display: none">
          <p class="final-major" id="major-name"></p>
          <span class="confidence-pill" id="confidence"></span>

          <h4 class="mt-4">Your Scores</h4>

          <ul class="list-group mt-3" id="scores-list"></ul>

          <button
            class="btn btn-primary mt-4 px-5"
            onclick="window.location.href='index.html'"
          >
            Finish
          </button>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        fetch("php/assessment/final_result.php")
          .then((res) => res.json())
          .then((data) => {
            if (!data.success) {
              document.getElementById("loading").innerHTML =
                "Error: " + data.message;
              return;
            }

            document.getElementById("loading").style.display = "none";
            document.getElementById("result-box").style.display = "block";

            document.getElementById("major-name").innerHTML = data.major;
            document.getElementById("confidence").innerHTML =
              "Confidence: " + data.confidence + "%";

            let scoresHTML = `
            <li class="list-group-item">
              <strong>Part 1 – Personality:</strong> ${data.scores[0]}
            </li>
            <li class="list-group-item">
              <strong>Part 2 – Interests:</strong> ${data.scores[1]}
            </li>
            <li class="list-group-item">
              <strong>Part 3 – Academic Ability:</strong> ${data.scores[2]}
            </li>
          `;

            document.getElementById("scores-list").innerHTML = scoresHTML;
          })
          .catch(() => {
            document.getElementById("loading").innerHTML = "System Error.";
          });
      });
    </script>
  </body>
</html>
