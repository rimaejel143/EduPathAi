<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPathAI | Sign Up</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <div
      class="login-container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card login-card shadow-lg p-4" style="max-width: 450px">
        <h2 class="text-center mb-4 fw-bold">
          <i class="fas fa-brain me-2" style="color: var(--accent-color)"></i>
          <span style="color: #333">Edu</span
          ><span style="color: var(--accent-color)">PathAI</span>
        </h2>
        <h5 class="text-center text-muted mb-4">Create Your Account</h5>

        <form>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="firstName" class="form-label">First Name</label>
              <input type="text" id="firstName" class="form-control" required />
            </div>
            <div class="col-md-6 mb-3">
              <label for="lastName" class="form-label">Last Name</label>
              <input type="text" id="lastName" class="form-control" required />
            </div>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Enter your email"
              required
            />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              id="password"
              class="form-control"
              required
            />
          </div>
          <div class="mb-4">
            <label for="confirmPassword" class="form-label"
              >Confirm Password</label
            >
            <input
              type="password"
              id="confirmPassword"
              class="form-control"
              required
            />
          </div>

          <!-- غير type من submit إلى button -->
          <button
            type="button"
            class="btn btn-primary w-100"
            onclick="handleRegister()"
          >
            Sign Up
          </button>

          <hr />
          <div class="text-center">
            <p class="mb-0">
              Already have an account?
              <a href="sign_in.html" class="fw-bold">Sign In</a>
            </p>
          </div>
        </form>
      </div>
    </div>
    <script>
      function handleRegister() {
        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        console.log("Form values:", {
          firstName,
          lastName,
          email,
          password: "***",
        });

        if (!firstName || !lastName || !email || !password) {
          alert("Please fill all fields!");
          return;
        }

        if (password !== confirmPassword) {
          alert("Passwords do not match!");
          return;
        }

        const full_name = firstName + " " + lastName;

        console.log("Sending data:", { full_name, email, password: "***" });

        fetch("./php/auth/register.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            full_name: full_name,
            email: email,
            password: password,
          }),
        })
          .then((response) => {
            console.log("Response status:", response.status);
            return response.json();
          })
          .then((data) => {
            console.log("Response data:", data);
            if (data.success) {
              alert("Registration successful! Redirecting to test...");
              window.location.href = "test.html";
            } else {
              alert("Error: " + data.message);
            }
          })
          .catch((error) => {
            console.error("Network error:", error);
            alert("Network error. Please try again.");
          });
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      fetch("navbar.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("navbar-placeholder").innerHTML = data;
        });
    </script>
  </body>
</html>
