<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPathAI | Sign In</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <style>
      /* ... (نفس تنسيقات الألوان والبطاقة السابقة) ... */
      :root {
        --primary-blue-dark: #1b3a5e;
        --primary-blue-light: #4e7ea7;
        --accent-yellow: #fdc80a;
        --background-gradient: linear-gradient(
          135deg,
          var(--primary-blue-dark) 0%,
          var(--primary-blue-light) 100%
        );
      }
      body {
        /* ... */
      }
      .auth-card {
        /* ... */
      }
      .logo-text-edu {
        /* ... */
      }
      .logo-text-pathai {
        /* ... */
      }
      .btn-primary-custom {
        /* ... */
      }
      .link-accent {
        /* ... */
      }
    </style>
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <div
      class="login-container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card login-card shadow-lg p-4">
        <div class="text-center mb-4">
          <i class="fas fa-brain me-2" style="color: var(--accent-yellow)"></i>
          <h2 class="d-inline-block fw-bold mb-0">
            <span style="color: #333">Edu</span
            ><span style="color: var(--accent-yellow)">PathAI</span>
          </h2>
          <h5 class="mt-3 text-muted">Sign In to Your Account</h5>
        </div>

        <form id="loginForm">
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="example@domain.com"
              required
            />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <button
            type="button"
            class="btn btn-primary w-100"
            onclick="handleLogin()"
          >
            Sign In
          </button>
        </form>

        <div class="text-center mt-3">
          <a
            href="forgot_password.html"
            class="text-decoration-none d-block mb-2"
            >Forgot Password?</a
          >
          <hr />
          <p class="mt-3 mb-0">
            Don't have an account?
            <a href="sign_up.html" class="fw-bold">Sign Up</a>
          </p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      fetch("navbar.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("navbar-placeholder").innerHTML = data;
        });
    </script>

    <script>
      function handleLogin() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        fetch("./php/auth/login.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.success) {
              // 🔥 حفظ بيانات المستخدم في localStorage
              localStorage.setItem("user_id", data.user_id);
              localStorage.setItem("user_type", data.user_type);
              localStorage.setItem("full_name", data.full_name);
              localStorage.setItem("user_data", JSON.stringify(data.user_data));

              // التوجيه حسب نوع المستخدم
              switch (data.user_type) {
                case "admin":
                  window.location.href = "admin_dashboard.html";
                  break;
                case "student":
                  window.location.href = "test.html";
                  break;
                default:
                  window.location.href = "index.html";
              }
            } else {
              alert("Error: " + data.message);
            }
          });
      }
    </script>
  </body>
</html>
