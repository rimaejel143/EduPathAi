<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPathAI - User Reports</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-blue-dark: #1b3a5e;
      }

      body {
        background-color: #f8f9fa;
      }

      .report-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        padding: 25px;
      }

      h2 {
        color: var(--primary-blue-dark);
        font-weight: 700;
      }

      table {
        background-color: white;
        border-radius: 10px;
        overflow: hidden;
      }

      th {
        background-color: var(--primary-blue-dark);
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="navbar-placeholder"></div>

    <div class="container py-5">
      <div class="report-card">
        <h2 class="text-center mb-4">All Student Final Results</h2>

        <div class="table-responsive">
          <table
            class="table table-bordered table-hover align-middle text-center"
          >
            <thead>
              <tr>
                <th>User ID</th>
                <th>Full Name</th>
                <th>Assessment ID</th>
                <th>Major</th>
                <th>Feedback</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="reports-table-body">
              <tr>
                <td colspan="6">Loading reports...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      // تحميل navbar
      fetch("navbar.html")
        .then((res) => res.text())
        .then(
          (data) =>
            (document.getElementById("navbar-placeholder").innerHTML = data)
        );

      // جلب التقارير من الخادم
      fetch("php/admin/fetch_user_reports.php")
        .then((res) => res.json())
        .then((data) => {
          const tableBody = document.getElementById("reports-table-body");
          tableBody.innerHTML = "";

          if (data.success && data.reports.length > 0) {
            data.reports.forEach((report) => {
              const row = `
                <tr>
                  <td>${report.user_id}</td>
                  <td>${report.full_name}</td>
                  <td>${report.student_assessment_id}</td>
                  <td>${report.major_name}</td>
                  <td>${report.feedback}</td>
                  <td>${new Date(report.created_at).toLocaleDateString()}</td>
                </tr>`;
              tableBody.innerHTML += row;
            });
          } else {
            tableBody.innerHTML = `<tr><td colspan="6">No reports found</td></tr>`;
          }
        })
        .catch((err) => {
          console.error("Error loading reports:", err);
          document.getElementById("reports-table-body").innerHTML =
            "<tr><td colspan='6'>Error loading data</td></tr>";
        });
    </script>
  </body>
</html>
